<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Rewind icon</title>
  <desc id="desc">Two interlocking loops around a conversation thread.</desc>
  <defs>
    <linearGradient id="warm" x1="102" y1="28" x2="210" y2="136" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cool" x1="42" y1="214" x2="150" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <circle
      cx="162"
      cy="94"
      r="54"
      fill="none"
      stroke="url(#warm)"
      stroke-width="22"
      stroke-linecap="round"
      stroke-dasharray="270 120"
      transform="rotate(-28 162 94)"
    />
    <circle
      cx="94"
      cy="162"
      r="54"
      fill="none"
      stroke="url(#cool)"
      stroke-width="22"
      stroke-linecap="round"
      stroke-dasharray="270 120"
      transform="rotate(152 94 162)"
    />
    <path
      d="M146 56c-15 8-25 24-25 43c0 17 9 31 23 38c-14 7-23 21-23 38c0 19 10 35 25 43"
      fill="none"
      stroke="#0f172a"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <circle cx="150" cy="94" r="15" fill="#fbbf24"/>
    <circle cx="106" cy="162" r="15" fill="#22d3ee"/>
  </g>
</svg>
