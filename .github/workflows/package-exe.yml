name: Package Windows EXE

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            server/pnpm-lock.yaml
            viewer/pnpm-lock.yaml

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install server dependencies
        run: pnpm --dir server install --frozen-lockfile

      - name: Install viewer dependencies
        run: pnpm --dir viewer install --frozen-lockfile

      - name: Run server tests
        run: pnpm run test:server

      - name: Build Windows EXE
        run: pnpm run package:exe

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: rewind-win-x64
          path: |
            dist/rewind-win-x64.exe
            dist/BUILD-INFO.txt
