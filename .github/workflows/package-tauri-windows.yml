name: Package Windows Tauri App

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-tauri:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            server/pnpm-lock.yaml
            viewer/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install server dependencies
        run: pnpm --dir server install --frozen-lockfile

      - name: Install viewer dependencies
        run: pnpm --dir viewer install --frozen-lockfile

      - name: Run server tests
        run: pnpm run test:server

      - name: Build Windows desktop bundle
        run: pnpm run desktop:build

      - name: Upload Windows bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rewind-windows-tauri-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/nsis/**
