name: Package Linux Tauri App

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/package-tauri.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/prepare-tauri.mjs'
      - 'server/**'
      - 'server/pnpm-lock.yaml'
      - 'shared/**'
      - 'src-tauri/**'
      - 'viewer/**'
      - 'viewer/pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: linux-tauri-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-tauri:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            server/pnpm-lock.yaml
            viewer/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install server dependencies
        run: pnpm --dir server install --frozen-lockfile

      - name: Install viewer dependencies
        run: pnpm --dir viewer install --frozen-lockfile

      - name: Run server tests
        run: pnpm run test:server

      - name: Build desktop bundles
        run: pnpm run desktop:build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rewind-linux-bundle-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/appimage/**
            src-tauri/target/release/bundle/deb/**
