<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rewind</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.25), transparent 35%),
          linear-gradient(180deg, #0f172a 0%, #020617 100%);
      }

      .startup {
        width: min(520px, calc(100vw - 32px));
      }

      .card {
        padding: 28px 32px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.82);
        border: 1px solid rgba(148, 163, 184, 0.2);
        box-shadow: 0 18px 60px rgba(2, 6, 23, 0.35);
      }

      .card.error {
        border-color: rgba(248, 113, 113, 0.45);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.4rem;
      }

      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.6;
      }

      p + p {
        margin-top: 12px;
      }

      code {
        font-family: "SFMono-Regular", ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, monospace;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main class="startup">
      <div class="card">
        <h1>Starting Rewind...</h1>
        <p>Launching the embedded local server and preparing your session viewer.</p>
      </div>
    </main>
  </body>
</html>
